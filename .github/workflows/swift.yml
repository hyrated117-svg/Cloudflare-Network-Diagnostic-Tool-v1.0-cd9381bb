name: Swift CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  swift-build-test:
    name: 🧰 Swift Build & Test
    runs-on: macos-latest

    steps:
      - name: 🧱 Checkout repository
        uses: actions/checkout@v4

      - name: 🧰 Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "15.2"

      - name: 🛠 Build SwiftUI App
        working-directory: SwiftUI-App
        run: |
          xcodebuild \
            -scheme GeneratedAppApp \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            build

      - name: 🧪 Run Swift Tests (if present)
        working-directory: SwiftUI-App
        run: |
          if ls Tests 1> /dev/null 2>&1; then
            xcodebuild \
              -scheme GeneratedAppApp \
              -sdk iphonesimulator \
              -destination 'platform=iOS Simulator,name=iPhone 15' \
              test
          else
            echo "No Swift tests found — skipping"
          fi

      - name: 🔍 SwiftLint (if available)
        run: |
          if command -v swiftlint >/dev/null; then
            swiftlint lint --strict
          else
            echo "SwiftLint not installed — skipping"
          fi

      - name: 📤 Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: swift-build-logs
          path: |
            ~/Library/Logs/DiagnosticReports
            **/*.log
          retention-days: 7

  linux-swift-build:
    name: 🐧 Swift Build (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: 🧱 Checkout repository
        uses: actions/checkout@v4

      - name: 🧰 Install Swift toolchain
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "5.9"

      - name: 🛠 Build AppMaker Swift components
        working-directory: AppMaker/Generator
        run: swift build --configuration release

      - name: 🔍 Swift Format (if available)
        run: |
          if command -v swift-format >/dev/null; then
            swift-format lint -r .
          else
            echo "swift-format not installed — skipping"
          fi

      - name: 📤 Upload Linux build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-swift-build-logs
          path: |
            **/*.log
          retention-days: 7
