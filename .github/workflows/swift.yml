name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build-test:
    name: 🔧 Build & Test Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: 🧱 Checkout repository
        uses: actions/checkout@v4

      # -----------------------------
      # SwiftUI Build & Lint
      # -----------------------------
      - name: 🧰 Set up Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "5.9"

      - name: 🛠 Swift Build
        working-directory: SwiftUI-App
        run: swift build

      - name: 🔍 SwiftLint (if available)
        run: |
          if command -v swiftlint >/dev/null; then
            swiftlint lint --strict
          else
            echo "SwiftLint not installed — skipping"
          fi

      # -----------------------------
      # Python MCP Server
      # -----------------------------
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

